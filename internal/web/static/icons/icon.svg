<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d23"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  <!-- Door/open symbol -->
  <rect x="140" y="120" width="180" height="280" rx="12" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <rect x="155" y="135" width="150" height="250" rx="6" fill="url(#accent)" opacity="0.15"/>
  <!-- Open door effect -->
  <line x1="155" y1="135" x2="80" y2="175" stroke="url(#accent)" stroke-width="6"/>
  <line x1="80" y1="175" x2="80" y2="395" stroke="url(#accent)" stroke-width="6"/>
  <line x1="155" y1="385" x2="80" y2="395" stroke="url(#accent)" stroke-width="6"/>
  <!-- Letter В -->
  <text x="256" y="310" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="url(#accent)" text-anchor="middle">В</text>
  <!-- Subtitle dot -->
  <circle cx="256" cy="440" r="8" fill="#3fb950"/>
</svg>
